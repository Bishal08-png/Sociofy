services:
  - type: web
    name: sociofy
    runtime: node
    plan: free
    buildCommand: cd client && npm install && CI=false npm run build && cd ../Server && npm install
    startCommand: cd Server && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_DB
        sync: false
      - key: JWT_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PORT
        value: 4000
